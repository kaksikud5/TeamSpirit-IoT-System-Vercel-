<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能灰水处理监控系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: {
                animation: { 'fade-in': 'fadeIn 0.5s ease-out', 'slide-up': 'slideUp 0.4s ease-out' },
                keyframes: {
                    fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                    slideUp: { '0%': { opacity: '0', transform: 'translateY(12px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                }
            }}
        }
    </script>
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/scale.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intro.js/minified/introjs.min.css">
    <script src="https://cdn.jsdelivr.net/npm/intro.js/minified/intro.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background: linear-gradient(135deg, #e0f2fe 0%, #eff6ff 25%, #f8fafc 50%, #e0e7ff 75%, #ecfeff 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh; 
            color: #1e293b; 
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .skeleton { animation: sk-pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; background-color: #e2e8f0; border-radius: 0.5rem; }
        @keyframes sk-pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
        
        .glass { 
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.75)); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.9); 
            box-shadow: 0 10px 40px -10px rgba(15, 23, 42, 0.08), inset 0 1px 0 rgba(255,255,255,1); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .glass:hover { 
            box-shadow: 0 20px 40px -10px rgba(15, 23, 42, 0.12), inset 0 1px 0 rgba(255,255,255,1); 
            transform: translateY(-2px); 
        }
        
        .nav-glass { 
            background: rgba(255,255,255,0.85); 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 4px 20px -2px rgba(0,0,0,0.04);
        }
        
        .ph-detail-modal { display:none; }
        .ph-detail-modal.active { display:flex; animation: fadeInModal 0.3s ease-out forwards; }
        @keyframes fadeInModal { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; backdrop-filter: blur(8px); } }
        
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; position: relative; }
        .status-dot.green { background: #10b981; box-shadow: 0 0 12px rgba(16,185,129,0.5); }
        .status-dot.yellow { background: #f59e0b; box-shadow: 0 0 12px rgba(245,158,11,0.5); animation: pulse-yellow 2s infinite; }
        .status-dot.red { background: #ef4444; box-shadow: 0 0 12px rgba(239,68,68,0.5); animation: pulse-red 2s infinite; }
        .status-dot.gray { background: #94a3b8; }
        
        @keyframes pulse-yellow {
            0% { box-shadow: 0 0 0 0 rgba(245,158,11, 0.5); }
            70% { box-shadow: 0 0 0 6px rgba(245,158,11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245,158,11, 0); }
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239,68,68, 0.5); }
            70% { box-shadow: 0 0 0 8px rgba(239,68,68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239,68,68, 0); }
        }
        
        .metric-bar { height: 4px; border-radius: 4px 4px 0 0; position: absolute; bottom: 0; left: 0; right: 0; transition: height 0.3s ease, opacity 0.3s ease; opacity: 0.8; }
        .glass:hover .metric-bar { height: 6px; opacity: 1; }
        
        .trend-tab { 
            border: 1px solid rgba(219,234,254,0.6); 
            background: rgba(239,246,255,0.6); 
            color: #3b82f6; 
            border-radius: 0.75rem; 
            font-size: 0.8125rem; 
            font-weight: 600; 
            padding: 0.65rem 0.85rem; 
            text-align: left; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: block;
            width: 100%;
            white-space: nowrap;
        }
        .trend-tab:hover { background: rgba(219,234,254,0.9); transform: translateX(2px); }
        .trend-tab.active { 
            background: linear-gradient(135deg, #3b82f6, #4f46e5); 
            color: #fff; 
            border-color: transparent; 
            box-shadow: 0 8px 16px -4px rgba(59,130,246,0.4); 
            transform: translateX(4px);
        }
        
        .score-chip { display: inline-flex; align-items: center; border-radius: 999px; padding: 0.25rem 0.65rem; font-weight: 600; font-size: 0.75rem; background: linear-gradient(135deg, #ecfeff, #cffafe); color: #0f766e; border: 1px solid #a5f3fc; box-shadow: 0 2px 4px rgba(6,182,212,0.1); }
        
        /* 指标卡标题与单位同一行（避免 L/min、(ms/cm) 等折到下一行） */
        .metric-card-title {
            white-space: nowrap;
            display: inline-block;
        }
        /*
         * 块级 + overflow-x:auto：flex 子项 min-width:auto 时无法正确产生横向滚动，末尾 “)” 会被父级 overflow-hidden 裁掉。
         * 隐藏滚动条，避免标题与数值之间出现灰线。
         */
        .metric-card-title-row {
            display: block;
            width: 100%;
            min-width: 0;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .metric-card-title-row::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }
        /* 六列栅格下略收紧字距；字号略小于默认 xs，避免英文标题裁切 */
        @media (min-width: 1280px) {
            #step-cards .metric-card-title {
                font-size: 0.75rem;
                letter-spacing: 0.03em;
            }
        }
        
        ::-webkit-scrollbar { width:6px; height: 6px; } 
        ::-webkit-scrollbar-track { background:transparent; } 
        ::-webkit-scrollbar-thumb { background:rgba(148,163,184,0.4); border-radius:4px; transition: background 0.2s; }
        ::-webkit-scrollbar-thumb:hover { background:rgba(148,163,184,0.7); }
    </style>
</head>
<body class="antialiased text-gray-800">

<!-- Navbar -->
<nav class="nav-glass sticky top-0 z-50 px-6 py-3">
    <div class="container mx-auto max-w-7xl flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-500 to-cyan-400 flex items-center justify-center shadow-md">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
            </div>
            <h1 class="text-lg font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-700 to-indigo-600 tracking-tight" data-i18n="title">智能灰水处理监控平台 </h1>
        </div>
        <div class="flex items-center gap-3">
            <select id="lang-switch" class="bg-white/80 backdrop-blur-md border border-gray-200 text-sm rounded-xl px-3 py-2 shadow-sm cursor-pointer focus:ring-2 focus:ring-blue-400 outline-none transition-all hover:bg-white hover:shadow-md">
                <option value="zh">中文</option>
                <option value="en">English</option>
            </select>
            <button id="guide-btn" class="text-sm bg-gradient-to-r from-blue-50 to-indigo-50 hover:from-blue-100 hover:to-indigo-100 text-blue-600 py-2 px-4 rounded-xl font-medium border border-blue-100/50 shadow-sm hover:shadow transition-all duration-300" data-i18n="guide_btn">向导 </button>
        </div>
    </div>
</nav>

<main class="container mx-auto px-4 py-6 max-w-7xl">
    <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-4 mb-6" id="step-cards">
        <div class="glass p-5 rounded-2xl cursor-pointer relative" onclick="openModal('f1')">
            <div class="metric-card-title-row mb-1">
                <span class="metric-card-title text-xs text-gray-400 font-semibold uppercase tracking-wide" data-i18n="card_f1">入水流量（轻） </span>
            </div>
            <div id="val-f1" class="text-3xl font-extrabold mt-2 skeleton h-9 w-24"></div>
            <div class="mt-2 text-[11px] leading-4 text-gray-500 flex items-center gap-2">
                <span class="status-dot gray" id="range-dot-f1"></span>
                <span id="range-f1">--</span>
            </div>
            <div class="text-xs text-blue-500 mt-3 font-medium opacity-80 group-hover:opacity-100 transition-opacity" data-i18n="click_detail">点击查看详情 → </div>
            <div class="metric-bar bg-gradient-to-r from-blue-400 to-blue-500" id="bar-f1"></div>
        </div>
        <div class="glass p-5 rounded-2xl cursor-pointer relative" onclick="openModal('cond')">
            <div class="metric-card-title-row mb-1">
                <span class="metric-card-title text-xs text-gray-400 font-semibold uppercase tracking-wide" data-i18n="card_cond">电导率 </span>
            </div>
            <div id="val-cond" class="text-3xl font-extrabold mt-2 skeleton h-9 w-24"></div>
            <div class="mt-2 text-[11px] leading-4 text-gray-500 flex items-center gap-2">
                <span class="status-dot gray" id="range-dot-cond"></span>
                <span id="range-cond">--</span>
            </div>
            <div class="text-xs text-green-600 mt-3 font-medium opacity-80" data-i18n="click_detail">点击查看详情 → </div>
            <div class="metric-bar bg-gradient-to-r from-green-400 to-emerald-500" id="bar-cond"></div>
        </div>
        <div class="glass p-5 rounded-2xl cursor-pointer relative" onclick="openModal('ph')">
            <div class="metric-card-title-row mb-1">
                <span class="metric-card-title text-xs text-gray-400 font-semibold uppercase tracking-wide" data-i18n="card_ph">PH值 </span>
            </div>
            <div id="val-ph" class="text-3xl font-extrabold mt-2 skeleton h-9 w-20"></div>
            <div class="mt-2 text-[11px] leading-4 text-gray-500 flex items-center gap-2">
                <span class="status-dot gray" id="range-dot-ph"></span>
                <span id="range-ph">--</span>
            </div>
            <div class="text-xs text-indigo-500 mt-3 font-medium opacity-80" data-i18n="click_detail">点击查看详情 → </div>
            <div class="metric-bar bg-gradient-to-r from-indigo-400 to-indigo-600" id="bar-ph"></div>
        </div>
        <div class="glass p-5 rounded-2xl cursor-pointer relative" onclick="openModal('level')">
            <div class="metric-card-title-row mb-1">
                <span class="metric-card-title text-xs text-gray-400 font-semibold uppercase tracking-wide" data-i18n="card_level">液位 </span>
            </div>
            <div id="val-level" class="text-3xl font-extrabold mt-2 skeleton h-9 w-20"></div>
            <div class="mt-2 text-[11px] leading-4 text-gray-500 flex items-center gap-2">
                <span class="status-dot gray" id="range-dot-level"></span>
                <span id="range-level">--</span>
            </div>
            <div class="text-xs text-cyan-600 mt-3 font-medium opacity-80" data-i18n="click_detail">点击查看详情 → </div>
            <div class="metric-bar bg-gradient-to-r from-cyan-400 to-blue-500" id="bar-level"></div>
        </div>
        <div class="glass p-5 rounded-2xl cursor-pointer relative" onclick="openModal('turbidity')">
            <div class="metric-card-title-row mb-1">
                <span class="metric-card-title text-xs text-gray-400 font-semibold uppercase tracking-wide" data-i18n="card_turbidity">浊度 </span>
            </div>
            <div id="val-turbidity" class="text-3xl font-extrabold mt-2 skeleton h-9 w-24"></div>
            <div class="mt-2 text-[11px] leading-4 text-gray-500 flex items-center gap-2">
                <span class="status-dot gray" id="range-dot-turbidity"></span>
                <span id="range-turbidity">--</span>
            </div>
            <div class="text-xs text-purple-600 mt-3 font-medium opacity-80" data-i18n="click_detail">点击查看详情 → </div>
            <div class="metric-bar bg-gradient-to-r from-purple-400 to-fuchsia-500" id="bar-turbidity"></div>
        </div>
        <div class="glass p-5 rounded-2xl cursor-pointer relative" onclick="openModal('f2')">
            <div class="metric-card-title-row mb-1">
                <span class="metric-card-title text-xs text-gray-400 font-semibold uppercase tracking-wide" data-i18n="card_f2">入水流量（重） </span>
            </div>
            <div id="val-f2" class="text-3xl font-extrabold mt-2 skeleton h-9 w-20"></div>
            <div class="mt-2 text-[11px] leading-4 text-gray-500 flex items-center gap-2">
                <span class="status-dot gray" id="range-dot-f2"></span>
                <span id="range-f2">--</span>
            </div>
            <div class="text-xs text-indigo-500 mt-3 font-medium opacity-80" data-i18n="click_detail">点击查看详情 → </div>
            <div class="metric-bar bg-gradient-to-r from-indigo-500 to-blue-600" id="bar-f2"></div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 lg:items-stretch gap-6">
        <!-- Left: Quality + Chart -->
        <div class="lg:col-span-2 space-y-6 lg:min-h-0">
            <!-- Quality Grade -->
            <div class="glass p-6 rounded-2xl" id="step-quality">
                <h2 class="text-lg font-bold mb-4 text-slate-600" data-i18n="quality_title">综合水质评级 </h2>
                <div class="flex flex-col xl:flex-row xl:items-start gap-4 xl:gap-6">
                    <div id="quality-grade" class="text-lg md:text-xl font-bold px-5 py-3 rounded-2xl text-white skeleton h-16 min-w-[168px] flex items-center justify-center text-center whitespace-nowrap shadow-md transition-transform hover:scale-105 shrink-0"></div>
                    <div class="flex-1 min-w-0 flex flex-col gap-1">
                        <div class="flex flex-wrap items-center gap-1.5">
                            <div id="quality-score" class="text-lg font-semibold text-slate-700 skeleton h-6 w-40"></div>
                        </div>
                        <div id="quality-usage-detail" class="text-sm text-cyan-700"></div>
                        <div id="quality-reason" class="text-sm leading-6 text-slate-500 break-words skeleton min-h-[1.25rem] w-full max-w-xl mb-1"></div>
                        <button type="button" class="mt-1 text-xs text-amber-600 hover:text-amber-700 font-medium self-start" data-i18n="quality_click_detail" onclick="openModal('quality')">查看评级标准 → </button>
                    </div>
                </div>
            </div>
            <!-- Chart -->
            <div class="glass p-6 rounded-2xl" id="step-chart">
                <div class="flex flex-wrap items-center justify-between gap-2 mb-4">
                    <h2 class="text-lg font-bold text-slate-600" data-i18n="chart_title">参数变化趋势 (近2000条数据) </h2>
                    <div class="flex items-center gap-2" id="step-actions">
                        <button id="refresh-btn" type="button" class="text-sm bg-gradient-to-r from-blue-50 to-blue-100 hover:from-blue-100 hover:to-blue-200 text-blue-700 px-3 py-2 rounded-lg border border-blue-200/60 shadow-sm hover:shadow transition-all" data-i18n="refresh_data">更新数据</button>
                        <button id="export-btn" type="button" class="text-sm bg-gradient-to-r from-emerald-50 to-emerald-100 hover:from-emerald-100 hover:to-emerald-200 text-emerald-700 px-3 py-2 rounded-lg border border-emerald-200/60 shadow-sm hover:shadow transition-all" data-i18n="export_data">导出数据</button>
                        <div id="net-latency-box" class="text-sm px-3 py-2 rounded-lg border border-slate-200/80 bg-white/60 backdrop-blur-sm text-slate-600 inline-flex items-center gap-2 shadow-sm">
                            <span class="status-dot gray" id="net-latency-dot"></span>
                            <span id="net-latency-text">网络延迟: --</span>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 xl:grid-cols-[248px_1fr] gap-4">
                    <div class="space-y-2 flex flex-col" id="trend-tabs">
                        <button class="trend-tab active" data-trend="overview" data-i18n="trend_all">总览趋势图</button>
                        <button class="trend-tab" data-trend="cond" data-i18n="trend_cond">电导率趋势</button>
                        <button class="trend-tab" data-trend="ph" data-i18n="trend_ph">PH值趋势</button>
                        <button class="trend-tab" data-trend="turbidity" data-i18n="trend_turbidity">浊度趋势</button>
                        <button class="trend-tab" data-trend="level" data-i18n="trend_level">液位趋势</button>
                        <button class="trend-tab" data-trend="f1" data-i18n="trend_f1">入水流量（轻）趋势</button>
                        <button class="trend-tab" data-trend="f2" data-i18n="trend_f2">入水流量（重）趋势</button>
                    </div>
                    <div id="main-chart" style="height:420px;width:100%;" class="skeleton rounded-xl"></div>
                </div>
            </div>
        </div>

        <div class="flex flex-col min-h-[420px] lg:min-h-0 lg:h-full">
            <div class="glass p-5 rounded-2xl flex flex-col flex-1 min-h-0 h-full" id="step-ai">
                <h2 class="text-lg font-bold mb-3 text-gray-600 flex items-center gap-2 shrink-0">
                    <span class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-500 flex items-center justify-center">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    </span>
                    <span data-i18n="ai_title">水质小帮手</span>
                </h2>
                <div id="chat-messages" class="flex-1 min-h-0 overflow-y-auto space-y-3 mb-3 pr-1">
                    <div class="bg-white/80 backdrop-blur-sm text-gray-700 p-3 rounded-2xl rounded-tl-sm text-base leading-relaxed border border-blue-100/50 shadow-md" data-i18n="ai_greeting">
                        您好！我是水质小帮手。关于水质指标、异常原因等，您可以随时问我。
                    </div>
                </div>
                <div class="flex gap-2 shrink-0">
                    <input type="text" id="ai-input" class="flex-1 border border-gray-200/80 rounded-xl px-4 py-3 text-base focus:ring-2 focus:ring-blue-400/50 outline-none bg-white/60 backdrop-blur-sm shadow-inner transition-all" placeholder="输入问题..." data-i18n-placeholder="ai_placeholder"/>
                    <button id="ai-send" class="bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white px-5 py-3 rounded-xl text-base font-medium transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5 ab-btn" data-i18n="ai_send">发送 </button>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="config-panel" class="fixed right-4 bottom-4 z-40 w-[360px] max-w-[calc(100vw-2rem)] glass rounded-2xl p-5 border border-cyan-100/50 shadow-2xl backdrop-blur-xl transition-all">
    <div class="flex items-center justify-between mb-3">
        <div class="text-sm font-bold text-slate-700" data-i18n="config_title">数据源与AI配置</div>
        <button id="cfg-close-btn" type="button" class="text-xs text-slate-500 hover:text-slate-700" data-i18n="config_close">关闭</button>
    </div>
    <div class="space-y-2.5">
        <div>
            <label class="text-xs text-slate-500" for="cfg-channel-id" data-i18n="config_channel">ThingSpeak Channel ID</label>
            <input id="cfg-channel-id" type="text" class="mt-1 w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 outline-none bg-white/90" placeholder="3302533">
        </div>
        <div>
            <label class="text-xs text-slate-500" for="cfg-read-key" data-i18n="config_read_key">ThingSpeak Read Key</label>
            <input id="cfg-read-key" type="text" class="mt-1 w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 outline-none bg-white/90" placeholder="Read Key">
        </div>
        <div>
            <label class="text-xs text-slate-500" for="cfg-ai-key" data-i18n="config_ai_key">AI API Key</label>
            <input id="cfg-ai-key" type="password" class="mt-1 w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 outline-none bg-white/90" placeholder="sk-...">
        </div>
        <div class="flex items-center justify-between gap-2 pt-1">
            <span id="cfg-status" class="text-xs text-slate-500"></span>
            <button id="cfg-save-btn" type="button" class="text-xs bg-cyan-50 hover:bg-cyan-100 text-cyan-700 px-3 py-2 rounded-lg border border-cyan-100 font-medium" data-i18n="config_save">保存并应用</button>
        </div>
    </div>
</div>
<button id="cfg-toggle-open" type="button" class="hidden fixed right-4 bottom-4 z-40 text-xs bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-600 hover:to-blue-600 text-white px-4 py-2.5 rounded-xl shadow-lg hover:shadow-xl transition-all hover:-translate-y-0.5" data-i18n="config_open" data-guide-step="config-open">打开配置</button>

<!-- Detail Modal -->
<div id="detail-modal" class="ph-detail-modal fixed inset-0 z-[100] bg-black/40 backdrop-blur-sm items-center justify-center p-4">
